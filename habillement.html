<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habillement — Maison Sylla</title>
<meta name="description" content="Habillement Maison Sylla : vêtements et accessoires pour homme et femme, sélectionnés avec soin.">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest-client.json">
<meta name="theme-color" content="#1B2A4A">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/client-icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Maison Sylla">
</head>
<body>

<header class="site-header" id="site-header"></header>

<main>
  <section class="page-hero cat-accent-habillement">
    <div class="wrap">
      <p class="breadcrumb"><a href="index.html">Accueil</a> / Habillement</p>
      <p class="eyebrow">Univers</p>
      <h1>Habillement</h1>
      <p>Vêtements et accessoires pour homme et femme, sélectionnés avec le même souci du détail que le reste de la maison.</p>
    </div>
  </section>

  <div class="wrap">
    <div class="genre-tabs" id="genreTabs">
      <button type="button" class="genre-tab active" data-genre="all">Tout voir</button>
      <button type="button" class="genre-tab" data-genre="homme">Homme</button>
      <button type="button" class="genre-tab" data-genre="femme">Femme</button>
    </div>
  </div>

  <div class="wrap listing">
    <aside class="filters">
      <h4>Tissu</h4>
      <div class="filter-group">
        <select id="f-tissu" class="select-field">
          <option value="all">Tous les tissus</option>
        </select>
      </div>
      <h4>Disponibilité</h4>
      <div class="filter-group">
        <label><input type="checkbox" id="f-instock"> En stock uniquement</label>
      </div>
      <h4>Prix (FCFA)</h4>
      <div class="filter-group">
        <div class="price-inputs">
          <input type="number" id="f-min" placeholder="Min">
          <span>–</span>
          <input type="number" id="f-max" placeholder="Max">
        </div>
      </div>
      <h4>Trier par</h4>
      <div class="filter-group">
        <select id="f-sort" class="select-field">
          <option value="default">Pertinence</option>
          <option value="price-asc">Prix croissant</option>
          <option value="price-desc">Prix décroissant</option>
        </select>
      </div>
      <button class="filter-reset" id="f-reset">Réinitialiser les filtres</button>
    </aside>

    <div>
      <p class="result-count" id="resultCount"></p>
      <div class="product-grid" id="productGrid"></div>
    </div>
  </div>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/pwa-register.js"></script>
<script>
  mountHeaderFooter('habillement');
  const CATEGORY_SLUG = 'habillement';
  let currentGenre = 'all';

  const tissuSelect = document.getElementById('f-tissu');
  Object.entries(TISSUS).forEach(([key, label]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = label;
    tissuSelect.appendChild(opt);
  });

  function productCardHTML(p){
    const genreTag = p.genre ? `<span class="product-genre">${p.genre === 'homme' ? 'Homme' : p.genre === 'femme' ? 'Femme' : 'Unisexe'}</span>` : '';
    const tissuTag = p.tissu && TISSUS[p.tissu] ? `<span class="product-genre product-genre-alt">${TISSUS[p.tissu]}</span>` : '';
    return `
    <article class="product-card">
      <a href="produit.html?id=${p.id}" class="product-media">
        ${p.stock ? `<span class="stock-tag">En stock</span>` : `<span class="stock-tag out">Rupture</span>`}
        ${p.icon}
      </a>
      <div class="product-body">
        <span class="product-cat">${CATEGORIES[p.cat].label} ${genreTag} ${tissuTag}</span>
        <a href="produit.html?id=${p.id}" class="product-name">${p.name}</a>
        <span class="product-price">${formatFCFA(p.price)}</span>
        <div class="product-actions">
          <button class="btn btn-ink btn-sm btn-block" data-add="${p.id}" ${p.stock ? '' : 'disabled'}>${p.stock ? 'Ajouter au panier' : 'Indisponible'}</button>
        </div>
      </div>
    </article>`;
  }

  function renderList(){
    const tissu = tissuSelect.value;
    const inStockOnly = document.getElementById('f-instock').checked;
    const min = parseFloat(document.getElementById('f-min').value) || 0;
    const max = parseFloat(document.getElementById('f-max').value) || Infinity;
    const sort = document.getElementById('f-sort').value;

    let items = PRODUCTS.filter(p => p.cat === CATEGORY_SLUG);
    if(currentGenre !== 'all') items = items.filter(p => p.genre === currentGenre);
    if(tissu !== 'all') items = items.filter(p => p.tissu === tissu);
    if(inStockOnly) items = items.filter(p => p.stock);
    items = items.filter(p => p.price >= min && p.price <= max);
    if(sort === 'price-asc') items = items.slice().sort((a,b) => a.price - b.price);
    if(sort === 'price-desc') items = items.slice().sort((a,b) => b.price - a.price);

    document.getElementById('resultCount').textContent = `${items.length} produit${items.length>1?'s':''}`;
    document.getElementById('productGrid').innerHTML = items.map(productCardHTML).join('') ||
      `<p class="empty-note">Aucun produit ne correspond à ces filtres.</p>`;

    document.querySelectorAll('[data-add]').forEach(btn => {
      btn.addEventListener('click', () => {
        addToCart(btn.getAttribute('data-add'), 1);
        showToast('Ajouté au panier');
      });
    });
  }

  document.querySelectorAll('.genre-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.genre-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentGenre = tab.getAttribute('data-genre');
      renderList();
    });
  });

  ['f-instock','f-min','f-max','f-sort','f-tissu'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderList);
  });
  document.getElementById('f-reset').addEventListener('click', () => {
    document.getElementById('f-instock').checked = false;
    document.getElementById('f-min').value = '';
    document.getElementById('f-max').value = '';
    document.getElementById('f-sort').value = 'default';
    tissuSelect.value = 'all';
    document.querySelectorAll('.genre-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.genre-tab[data-genre="all"]').classList.add('active');
    currentGenre = 'all';
    renderList();
  });

  (async function(){
    document.getElementById('productGrid').innerHTML = '<p class="empty-note">Chargement du catalogue…</p>';
    await loadProducts();

    // Si l'URL contient ?genre=homme ou ?genre=femme (ex. lien direct depuis l'accueil), on présélectionne l'onglet
    const params = new URLSearchParams(location.search);
    const g = params.get('genre');
    if(g === 'homme' || g === 'femme'){
      document.querySelectorAll('.genre-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.genre-tab[data-genre="${g}"]`).classList.add('active');
      currentGenre = g;
    }

    renderList();
  })();
</script>
</body>
</html>
